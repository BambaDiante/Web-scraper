<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
    <title>Page de recherche</title>
    <style>
        body {
            background: linear-gradient(to left, #511886, black);
            background-attachment: fixed;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            min-height: 100vh;
            
            margin: 0;
            flex-direction: column;
            gap:20px;
        }
        h1{
            margin-top:80px;
            display:flex;
            width:31ch;
            white-space:nowrap;
            overflow:hidden;
            animation:typing 2s steps(31) forwards;
        }
        @keyframes typing{
            from {
                width: 0;
            }
            
        }

        .search { 
            margin-top:60px;
            --padding: 14px;
            display: flex;
            align-items: center;
            padding: var(--padding); 
            border-radius: 15px;
            border: #511886 solid 2px;
            background: #f6f6f6;
            width: max-content;
        }

        .search-input {
            font-size: 16px;
            color: #333;
            margin-left: 10px;
            outline: none;
            border: none;
            background: transparent;
            width: 300px;
        }

        .search-icon {
            color: #511886; 
        }
        button{
            border-radius: 50%;
            border:none;
            width:40px;
            height:40px;
        }
        .container{
            margin-top: 40px;
            width: 90%;
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px;
            background: #f6f6f6;
            border-radius: 15px;
            padding: 20px;

        }
        .no-results{
            background: #f6f6f6;
            border-radius: 15px;
            width:90%;
            padding:30px;
            font-size:20px;
            color:#333;
            justify-content: center;
            text-align: center;
        }
        .no-results p{
            justify-content: center;
            text-align: center;
        }

        .product-card {
            display: flex;
            flex-direction: column;
            width: 100%; 
            height: auto; 
            border: 2px solid #511886;
            border-radius: 15px;
            padding: 15px;
            background: white; 
            box-sizing: border-box;
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: contain; /* Évite de déformer l'image */
            margin-bottom: 15px;
        }
        .product-name,.product-price,.product-source{
            color:#333;
            font-family: impact;
            margin:10px auto;
            
        }
        .product-source{
           
            background: #511886;
            padding:10px;
            border-radius: 10px;
            color:white;
        }
    </style>
</head>
<body>
    <h1>Versus- Comparateur de produits</h1>
    
    <form class="search" action="" method="POST">
        <button type="submit">
            <span class="material-symbols-outlined search-icon">
                search
            </span>
        </button>
        <input type="search" class="search-input" name="produit recherche" placeholder="Rechercher un produit">
    </form>
    {% if resultats %}
        <div class="container">
            {% for resultat in resultats %}
                <article class="product-card">
                    <img class="product-image" src="{{resultat['lien']}}" alt="image du produit">
                    <span class="product-name">
                        {{resultat['titre']}}
                    </span>
                    <span class="product-price">
                        {{resultat['prix']}} FCFA
                    </span>
                    <span class="product-source">
                        {{resultat['source']}}
                    </span>
                </article>
            {% endfor %}
        </div>
        {% else %}
        <div class="no-results">
            <p>Désolé, aucun produit ne correspond à votre recherche.</p>
        </div>
    {% endif %}
    
</body>
</html>
